version: '3.8'

services:
  # Application container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeunion-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_NAME=CodeUnion
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://127.0.0.1
      - LOG_CHANNEL=stack
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=codeunion
      - DB_USERNAME=codeunion_user
      - DB_PASSWORD=***REMOVED***
      - CACHE_DRIVER=redis
      - CACHE_HOST=redis
      - CACHE_PORT=6379
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=***REMOVED***
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    volumes:
      - ./:/app
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis
      - meilisearch
    networks:
      - codeunion

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: codeunion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - codeunion

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: codeunion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeunion
      POSTGRES_USER: codeunion_user
      POSTGRES_PASSWORD: "***REMOVED***"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codeunion

  # Redis cache & queue
  redis:
    image: redis:7-alpine
    container_name: codeunion-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - codeunion

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: codeunion-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ***REMOVED***
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - codeunion

  # Mailhog (development email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: codeunion-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - codeunion

networks:
  codeunion:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
